<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07070a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="dark">
<title>Geschirrspülerliste</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>


  <div id="loading">
    <div class="spinner"></div>
    <p>Spielstand wird geladen …</p>
  </div>


  <div class="app">
    <header class="topbar">
      <span class="icon">🍽️</span>
      <h1>Geschirrspülerliste</h1>
    </header>


    <main>
      <!-- Hero: wer ist dran -->
      <section class="hero">
        <div class="eyebrow">Aktuell dran</div>
        <div class="due-name tie" id="hero-name">Unentschieden</div>
        <div class="hero-sub" id="hero-sub">Beide gleich oft dran gewesen</div>


        <div class="battle-bar-wrap">
          <div class="battle-names">
            <span>Lena <b id="bar-label-lena">0</b></span>
            <span>Jojo <b id="bar-label-jojo">0</b></span>
          </div>
          <div class="battle-bar">
            <div class="bar-fill lena" id="bar-lena" style="width:50%"></div>
            <div class="bar-fill jojo" id="bar-jojo" style="width:50%"></div>
          </div>
        </div>
      </section>


      <!-- Score cards -->
      <section class="score-grid">
        <div class="score-card lena" id="lena-card">
          <div class="avatar">L</div>
          <div class="name">Lena</div>
          <div class="count" id="lena-count">0</div>
          <button class="bump-btn" id="bump-lena">🍽️ +1 für Lena</button>
        </div>
        <div class="score-card jojo" id="jojo-card">
          <div class="avatar">J</div>
          <div class="name">Jojo</div>
          <div class="count" id="jojo-count">0</div>
          <button class="bump-btn" id="bump-jojo">🍽️ +1 für Jojo</button>
        </div>
      </section>


      <!-- Actions -->
      <section class="actions">
        <button class="action-btn pink" id="oracle-btn">🔮 Schicksal befragen</button>
        <button class="action-btn" id="motivate-btn">✨ Motivation</button>
      </section>
    </main>


    <footer>
      <span class="save-dot" id="save-dot"></span>
      <span>Euer Punktestand wird automatisch gespeichert</span>
    </footer>
  </div>


  <!-- Oracle overlay -->
  <div class="oracle-overlay" id="oracle-overlay">
    <div class="oracle-card">
      <button class="oracle-close" id="oracle-close" aria-label="Schließen">✕</button>
      <div class="oracle-status" id="oracle-status">Stricherl werden gezählt …</div>
      <div class="oracle-result" id="oracle-result"></div>
      <div class="oracle-confetti" id="oracle-confetti"></div>
    </div>
  </div>


  <!-- Quote toast -->
  <div class="quote-toast" id="quote-toast">
    <p id="quote-text"></p>
    <button class="quote-close" id="quote-close" aria-label="Schließen">✕</button>
  </div>


<script type="module" src="script.js"></script>
</body>
</html>
